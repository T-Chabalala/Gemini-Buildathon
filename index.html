<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Citizen Service Agent</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f4f7fb; color: #123; }
      .container { max-width: 960px; margin: 0 auto; padding: 24px; }
      .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); margin-bottom: 16px; }
      textarea, input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; margin-top: 8px; }
      button { background: #0f766e; color: white; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; }
      .result { white-space: pre-wrap; }
      .status { font-weight: bold; }
      .tag { display: inline-block; background: #ccfbf1; color: #115e59; padding: 4px 8px; border-radius: 999px; margin-right: 8px; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>Citizen Service Agent</h1>
        <p>Route complaints to the right department and track progress.</p>
        <label>Describe your issue</label>
        <textarea id="issue" rows="4" placeholder="Example: My electricity was cut off and I need help with a municipal billing complaint."></textarea>
        <button id="submit">Route my request</button>
      </div>
      <div class="card" id="output" style="display:none"></div>
    </div>
    <script type="module" src="./public/app.js"></script>
  </body>
</html>
